name: Deploy GitHub Pages

# Publishes the landing page (site/index.html) with interactive cards linking to:
#   - the two lambda2c papers, compiled from .tex here (they are not committed)
#   - the two residual-return papers, compiled from .tex here so the served PDF
#     always tracks the source (a committed PDF would go stale on source edits)
#   - any contributed papers/*.tex, also compiled here
#   - the interactive Matrix Plates tool
# Static deploy via the official GitHub Actions Pages pipeline (no Jekyll).
# NOTE: this is the SOLE GitHub Pages deployer. The Static-HTML starter workflow
# (static.yml, which uploaded the whole repo root) was removed so it cannot race
# this build and publish the raw repository tree instead of the assembled _site/.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'papers/**'
      - 'lambda2c-emissiongap-verification/papers/**'
      - 'residual-return-verification/L00M/paper/*.tex'
      - 'residual-return-verification/L00M/paper/*.pdf'
      - 'matrix-plates/web/matrix_plates.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege permissions required by the Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile the lambda2c papers (.tex -> PDF)
        # lambda_2c needs 3 passes, emission_gap 2 (cross-refs + the [13] citation);
        # latexmk inside this action runs as many passes as needed. No bibtex.
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: lambda2c-emissiongap-verification/papers
          root_file: |
            lambda_2c_paper.tex
            emission_gap_paper.tex

      - name: Compile contributed papers (papers/*.tex -> PDF)
        # Companion papers dropped into papers/ as .tex are compiled here (latexmk,
        # multi-pass). The resulting papers/*.pdf are picked up by the assemble step's
        # `papers/*.pdf` copy, and referenced by a `kind: pdf` catalog entry.
        # NOTE: this action's root_file does not glob — list each .tex explicitly.
        # When adding a new companion .tex, add its filename to this list too.
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: papers
          root_file: |
            charge_measure_coupling.tex
            z5_no_salem_dichotomy.tex
            lehmers_box.tex
            relational_charge_paper.tex

      - name: Compile the residual-return papers (.tex -> PDF)
        # Compiled from source (not served from the committed PDF) so the site always
        # tracks the .tex. Manual thebibliography (no bibtex); tikz/pgfplots/algorithm2e/
        # listings are all in the action's TeXLive image. latexmk runs the passes needed.
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: residual-return-verification/L00M/paper
          root_file: |
            vector_substrate.tex
            residual_return_learning.tex

      - name: Set up Python (for Markdown doc rendering)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Assemble the site
        run: |
          set -euo pipefail
          mkdir -p _site/papers _site/tool
          cp site/index.html _site/index.html
          cp lambda2c-emissiongap-verification/papers/lambda_2c_paper.pdf      _site/papers/
          cp lambda2c-emissiongap-verification/papers/emission_gap_paper.pdf   _site/papers/
          cp residual-return-verification/L00M/paper/vector_substrate.pdf      _site/papers/
          cp residual-return-verification/L00M/paper/residual_return_learning.pdf _site/papers/
          cp matrix-plates/web/matrix_plates.html                              _site/tool/index.html
          # Contributed drop-zone: catalog + every PDF, plus raw .md sources (except the folder README).
          cp papers/catalog.json _site/papers/catalog.json
          shopt -s nullglob
          for f in papers/*.pdf; do cp "$f" _site/papers/; done
          for f in papers/*.md; do [ "$(basename "$f")" = "README.md" ] || cp "$f" _site/papers/; done
          for f in papers/*.html; do cp "$f" _site/papers/; done   # interactive tool pages (kind: tool)

      - name: Render Markdown docs to HTML
        run: |
          set -euo pipefail
          python -m pip install --quiet markdown pymdown-extensions
          python site/render_docs.py papers _site/papers
          echo "Assembled site:" && find _site -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
